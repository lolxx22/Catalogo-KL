<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hogar | KL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/hogar.css" />
  </head>
  <body class="book-page hogar-page">
    <header class="book-top">
      <nav class="nav container" aria-label="Menú principal">
        <a class="brand-mini" href="/">KL</a>
        <button
          class="menu-toggle"
          type="button"
          aria-label="Abrir menú"
          aria-expanded="false"
        >
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="/">Inicio</a></li>
          <li><a href="/catalogo">Catálogo</a></li>
          <li><a href="/#contacto">Contacto</a></li>
        </ul>
      </nav>
      <section class="book-header container">
        <img class="book-logo" src="../img/logo.jpeg" alt="Logo KL" />
        <h1>Hogar KL</h1>
      </section>
    </header>
    <main class="book-stage container">
      <aside class="book-character reveal">
        <img src="../img/personajehogar.jpeg" alt="Personaje de hogar KL" />
      </aside>
      <section class="notebook reveal" aria-live="polite">
        <div class="spiral" aria-hidden="true"></div>
        <div class="page-content">
          <p class="page-number" id="pageNumber">Hoja 1 de 1</p>
          <div class="product-placeholder" id="productPlaceholder">
            <img src="../img/sujetacortina.jpeg" alt="Sujeta cortina" />
          </div>
          <h2 id="productName">Sujeta cortina</h2>
          <p class="product-price" id="productPrice">Par: $3</p>
          <p class="product-promo" id="productPromo" hidden></p>
          <p id="productDescription">
            Detalle decorativo para recoger cortinas y dar calidez al hogar.
          </p>
        </div>
      </section>
    </main>
    <section
      class="book-controls container"
      aria-label="Controles del cuaderno"
    >
      <button class="btn btn-soft" id="prevPage" type="button">Anterior</button>
      <div class="dots" id="pageDots" aria-hidden="true"></div>
      <button class="btn btn-primary" id="nextPage" type="button">
        Siguiente
      </button>
    </section>
    <footer class="footer">
      <p><strong>KL</strong> | Detalles para el hogar</p>
      <p>© 2026 KL. Todos los derechos reservados.</p>
    </footer>
    <script src="../js/app.js"></script>
    <script src="../js/hogar.js"></script>
  </body>
</html>
